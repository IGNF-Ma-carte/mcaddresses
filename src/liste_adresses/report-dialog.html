<h3> Résultat du géocodage</h3>

</div>
<div class="chart_text">

  <p>

  <p>
    <i class="fi-location medium_points"></i>

  </p>
  <p>
    <i class="fi-location no_point"></i>
    <span data-attr="manual"></span> manuellement
  </p>
  <p>
    <i class="fi-location no_point"></i>
    <span data-attr="noGeoc"></span>

</div>
